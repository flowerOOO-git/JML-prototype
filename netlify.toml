[build]
  publish = "dist"
  command = "bash scripts/build-netlify.sh"

[[redirects]]
  from = "/"
  to = "/dev-replica/index.html"
  status = 200

[[redirects]]
  from = "/dev"
  to = "/dev-replica/index.html"
  status = 200

[[redirects]]
  from = "/approve"
  to = "/approve-share/index.html"
  status = 200

[[redirects]]
  from = "/mobile"
  to = "/mobile-approve.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/dev-replica/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/approve-share/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
