<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=/开发环境页面复刻-分享包/index.html" />
  <title>今麦郎 BPM 演示入口</title>
  <style>
    :root {
      --bg: #f4f5f8;
      --card: #fff;
      --text: #1f2a44;
      --muted: #6b7280;
      --accent: #ff0005;
      --line: #eceff5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    a {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 15px;
      transition: background 0.15s;
    }
    a:hover {
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>今麦郎 BPM 演示入口</h1>
    <p>纯静态演示站点。若未自动跳转，请从下方链接进入。</p>
    <ul>
      <li><a href="/开发环境页面复刻-分享包/index.html">开发环境复刻（首页 + 工作台）</a></li>
      <li><a href="/通用申请审批页面-分享包/index.html">通用申请审批页</a></li>
      <li><a href="/饮品OA通知通报-移动端审批页面.html">饮品 OA 移动端审批页</a></li>
    </ul>
  </main>
</body>
</html>
